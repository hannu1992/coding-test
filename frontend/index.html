<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Dashboard</title>
  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="icon" href="data:,">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <h2 class="mb-4">Inventory Dashboard</h2>

    <!-- Add Product Form -->
    <div class="card p-3 mb-4">
      <div class="row g-2">
        <div class="col-md-5">
          <input id="name" class="form-control" placeholder="Product name" />
        </div>
        <div class="col-md-3">
          <input id="quantity" type="number" class="form-control" placeholder="Quantity" />
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100" onclick="addProduct(this)">Add</button>
        </div>
      </div>
    </div>

    <!-- Filter / Search -->
    <div class="card p-3 mb-3">
      <div class="row g-2">
        <div class="col-md-6">
          <input id="search" class="form-control" placeholder="Search by name" oninput="loadProducts()" />
        </div>
      </div>
    </div>

    <!-- Product Table -->
    <div class="card p-3">
      <table class="table table-bordered table-striped">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th style="cursor:pointer" onclick="setSort('name')">
              Name <span id="nameSort"></span>
            </th>
            <th style="cursor:pointer" onclick="setSort('quantity')">
              Quantity <span id="qtySort"></span>
            </th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="productTable"></tbody>
      </table>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Confirm Delete</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            Are you sure you want to delete this product?
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button class="btn btn-danger" id="confirmDeleteBtn">
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
